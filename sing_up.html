<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login & Sign In</title>
<link rel="stylesheet" href="sing_up.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

<div class="left-panel">
    <h2 id="form-title">LOGIN</h2>
    <p id="switch-text">Don't have account?</p>
    <button onclick="toggleForm()" class="switch-btn" id="switch-btn">SIGN IN</button>
</div>

<div class="right-panel">

<!-- LOGIN FORM -->
<div class="form-box" id="login-form">

<div class="icon">
<i class="fa fa-user"></i>
</div>

<h2>LOGIN</h2>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="Email">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<a href="#" class="footer-link"><img src="images/google.png" alt="Illustration Image"> Countinue with Google </a>

<button class="main-btn">LOGIN</button>

</div>


<!-- SIGN UP FORM -->
<div class="form-box hidden" id="signup-form">

<div class="icon">
<i class="fa fa-user-plus"></i>
</div>

<h2>SIGN UP</h2>

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" placeholder="Full Name">
</div>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="Email">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<button class="main-btn">CREATE ACCOUNT</button>

</div>

</div>

</div>

<script src="sing_up.js"></script>

</body>
</html>
